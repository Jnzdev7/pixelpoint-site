<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/library/bootstrap.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/library/bootstrap.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <title>PixelPoint — Lançamentos</title>
    <style>
        :root { --azul: #0970BA; --azul-escuro: #04417A; --accent: #00C6FF; --bg: #0D1117; --card-bg: #131920; --borda: rgba(9,112,186,0.20); --txt: #E8EDF3; --txt-muted: #7A8A9A; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-navbar { background: linear-gradient(135deg, var(--azul-escuro), var(--azul), #1C8FDE) !important; box-shadow: 0 2px 24px rgba(9,112,186,0.40); position: sticky; top: 0; z-index: 100; }
        .bg-navbar .container-fluid { background: transparent !important; padding-block: 0.6rem; }
        .logo { max-width: 160px; filter: brightness(0) invert(1); }
        .navbar-nav a { font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.80) !important; padding: 0.4rem 0.9rem !important; border-radius: 6px; transition: background 0.15s, color 0.15s; }
        .navbar-nav a:hover, .navbar-nav a.active { color: #fff !important; background: rgba(255,255,255,0.14); text-decoration: none !important; }
        .navbar-toggler { border: 1.5px solid rgba(255,255,255,0.4) !important; border-radius: 6px !important; }
        .navbar-toggler-icon { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,0.9)' stroke-linecap='round' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important; }
        .icons-nav { list-style: none; display: flex; align-items: center; gap: 0.5rem; padding: 0; margin: 0; }
        .icons-nav li img { width: 22px; opacity: 0.8; filter: brightness(0) invert(1); transition: opacity 0.15s; cursor: pointer; }
        .icons-nav li img:hover { opacity: 1; }

        /* CONSTRUCTION PAGE */
        .construction-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            text-align: center;
            gap: 0;
        }
        .construction-icon {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .construction-wrap img {
            max-width: 320px;
            width: 100%;
            margin-bottom: 2rem;
            border-radius: 16px;
            opacity: 0.9;
        }
        .construction-wrap h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            letter-spacing: 0.12em;
            color: #fff;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .construction-wrap h1 span { color: var(--accent); }
        .construction-wrap p {
            color: var(--txt-muted);
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.65;
            margin: 0.75rem auto 2rem;
        }

        .progress-bar-wrap {
            width: 100%;
            max-width: 360px;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 100px;
            overflow: hidden;
            margin: 0 auto;
        }
        .progress-bar-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, var(--azul), var(--accent));
            border-radius: 100px;
            animation: progress-pulse 2.5s ease-in-out infinite;
        }
        @keyframes progress-pulse {
            0%, 100% { opacity: 0.6; width: 35%; }
            50% { opacity: 1; width: 55%; }
        }

        .notify-btn {
            font-family: 'Sora', sans-serif;
            font-weight: 600; font-size: 0.85rem;
            letter-spacing: 0.06em; text-transform: uppercase;
            padding: 0.75rem 2.5rem;
            background: linear-gradient(135deg, var(--azul), var(--azul-escuro));
            color: #fff; border: none;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(9,112,186,0.35);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-top: 1.8rem;
            display: inline-block;
            text-decoration: none;
        }
        .notify-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(9,112,186,0.45); color: #fff; }

        .rodape { background: linear-gradient(160deg, var(--azul-escuro), var(--azul), #1C8FDE); border-radius: 24px 24px 0 0; padding: 2.5rem 1rem; position: relative; overflow: hidden; }
        .rodape::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.04), transparent 50%), radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04), transparent 40%); }
        .rodape * { position: relative; }
        .separador-rodape { border: none; border-top: 1px solid rgba(255,255,255,0.18); opacity: 1; margin: 0 auto; }
        .footer-icons img { width: 26px; filter: brightness(0) invert(1); opacity: 0.75; transition: opacity 0.15s; }
        .footer-icons img:hover { opacity: 1; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-md bg-navbar mt-0 py-0">
            <div class="container-fluid py-2">
                <a class="navbar-brand" href="#"><img src="assets/images/logo.png" class="logo" alt="PixelPoint"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarScroll">
                    <hr class="border-2 border-white mb-2 d-md-none">
                    <ul class="navbar-nav mx-auto my-2 my-md-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                        <li class="nav-item"><a class="nav-link" href="noticia-principal.html">Notícias</a></li>
                        <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
                        <li class="nav-item"><a class="nav-link active" href="lancamento.html">Lançamentos</a></li>
                    </ul>
                    <hr class="border-2 border-white mb-2 d-md-none">
                    <ul class="icons-nav d-flex text-center align-items-center justify-content-center">
                        <li class="nav-item me-2"><img src="assets/images/search.png" alt="Buscar"></li>
                        <li class="nav-item me-2"><img src="assets/images/g2.png" alt=""></li>
                        <li class="nav-item"><img src="assets/images/user.png" alt="Perfil"></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="construction-wrap">
        <img src="assets/images/pagina_em_construcao.png" alt="Em construção">
        <h1>EM <span>BREVE</span></h1>
        <p>Estamos preparando algo incrível. A página de Lançamentos chegará em breve com tudo que você precisa saber sobre os próximos games.</p>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill"></div>
        </div>
        <a href="index.html" class="notify-btn">Voltar ao início</a>
    </main>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col-12 rodape">
                    <div class="row justify-content-center">
                        <div class="col-5 col-md-2 my-3 text-center">
                            <img src="assets/images/logo.png" class="w-100" style="filter:brightness(0) invert(1); max-width:130px;" alt="PixelPoint">
                        </div>
                        <div class="col-12"><hr class="separador-rodape w-75"></div>
                    </div>
                    <div class="row justify-content-center">
                        <div class="col-10 my-3 text-center footer-icons d-flex justify-content-center gap-3 flex-wrap">
                            <img src="assets/images/insta.png" alt="Instagram">
                            <img src="assets/images/facebook.png" alt="Facebook">
                            <img src="assets/images/youtube.png" alt="YouTube">
                            <img src="assets/images/tiktok.png" alt="TikTok">
                            <img src="assets/images/linkedln.png" alt="LinkedIn">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
